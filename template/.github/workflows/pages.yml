name: Deploy Word Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check GitHub Pages setup
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}/repos/${REPO}/pages")

          if [ "$status" = "404" ]; then
            echo "::error title=GitHub Pages is not enabled::Open https://github.com/${REPO}/settings/pages and set Build and deployment Source to GitHub Actions, then rerun this workflow."
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error title=Could not verify GitHub Pages setup::GitHub API returned HTTP ${status}."
            cat /tmp/pages.json
            exit 1
          fi

          if ! grep -q '"build_type"[[:space:]]*:[[:space:]]*"workflow"' /tmp/pages.json; then
            echo "::error title=GitHub Pages source must be GitHub Actions::Open https://github.com/${REPO}/settings/pages and set Build and deployment Source to GitHub Actions, then rerun this workflow."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .word-pages/quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
